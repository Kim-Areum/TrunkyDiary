name: TrunkyDiary
options:
  bundleIdPrefix: io.analoglab
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
settings:
  base:
    INFOPLIST_FILE: TrunkyDiary/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: io.analoglab.TrunkyDiary
    GENERATE_INFOPLIST_FILE: false
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 74W3FA8FLB
targets:
  TrunkyDiary:
    type: application
    platform: iOS
    sources:
      - path: TrunkyDiary
        excludes:
          - "**/*.plist"
    dependencies:
      - target: BabyDiaryWidget
    settings:
      base:
        INFOPLIST_FILE: TrunkyDiary/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TrunkyDiary/TrunkyDiary.entitlements
  BabyDiaryWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: BabyDiaryWidget
        excludes:
          - "**/*.plist"
      - path: TrunkyDiary/Models/CDBaby+CoreDataClass.swift
      - path: TrunkyDiary/Models/CDDiaryEntry+CoreDataClass.swift
      - path: TrunkyDiary/BabyDiary.xcdatamodeld
      - path: TrunkyDiary/Resources/Ownglyph_PDH.ttf
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.analoglab.TrunkyDiary.widget
        INFOPLIST_FILE: BabyDiaryWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BabyDiaryWidget/BabyDiaryWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 74W3FA8FLB
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
